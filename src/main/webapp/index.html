<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scudetto Predictor | Serie A</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="main-header">
    <h1>🏆 Serie A Predictor</h1>
</header>

<div class="app-container">
    <div id="table-container" class="panel">
        <p style="text-align: center;">Caricamento classifica...</p>
    </div>

    <div id="matches-panel" class="panel">
        <div class="matchday-header">
            <button id="prev-matchday" class="nav-btn" title="Previous matchday">◀</button>

            <div class="select-wrapper">
                <label for="matchday-select">Giornata: </label>
                <select id="matchday-select"></select>
            </div>

            <button id="next-matchday" class="nav-btn" title="Next matchday">▶</button>

            <button id="reset-btn" class="reset-btn" title="Reset all your predictions">🔄 Reset</button>

            <button id="share-wa-btn" class="share-btn" title="Condividi con i tuoi amici">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA" style="width:16px; vertical-align:middle;"> Condividi
            </button>
        </div>

        <div id="matches-container">
            <p style="text-align: center;">Caricamento partite...</p>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
